# Sentinel — Defense Stock Claim Analyzer
# Copy this file to config.yaml and customize as needed.
# Secrets (DATABASE_URL) go in .env, not here.

# Application Settings
app:
  port: 5000
  live_news_fetch: true

# Twitter/twscrape Settings
twitter:
  db_path: accounts.db
  proxies:
    # - socks5://user:pass@host1:port
    # - socks5://user:pass@host2:port

# Scraping Settings
scraping:
  limit_per_ticker: 50
  search_timeout: 300

# Labeling Thresholds
labeling:
  exaggeration_threshold: 0.02
  news_window_hours: 48

# Logging
logging:
  level: INFO
